[project]
name = "kalpixk-backend"
version = "0.1.0"
description = "Kalpixk SIEM Backend — AMD ROCm anomaly detection engine"
authors = ["Julián Juárez <julianjuarezmx01@gmail.com>"]
license = "MIT"
requires-python = ">=3.11"

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.9.0",
    "torch>=2.4.0",
    "numpy>=1.26.0",
    "scikit-learn>=1.5.0",
    "httpx>=0.27.0",
    "websockets>=13.0",
    "python-multipart>=0.0.12",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

# ─── Esto le dice a hatchling exactamente dónde están los paquetes ─────────────
[tool.hatch.build.targets.wheel]
packages = ["api", "detection", "utils", "training"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
