[workspace]
members = [
    "crates/kalpixk-core",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Julián Juárez <julianjuarezmx01@gmail.com>"]
license = "MIT"
repository = "https://github.com/JULIANJUAREZMX01/Wasm-Kalpixk_IA_DevOps"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
log = "0.4"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1.0", features = ["full"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.release.package.kalpixk-core]
opt-level = "z"   # Minimizar tamaño del WASM
