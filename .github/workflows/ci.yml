name: Kalpixk CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  RUST_LOG: debug

jobs:
  # ─── Lint y tests Rust ────────────────────────────────────────────────────────
  rust-check:
    name: Rust lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Format check
        run: cargo fmt --all -- --check
      
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      
      - name: Tests unitarios
        run: cargo test --all
      
      - name: Build WASM
        run: |
          cargo install wasm-pack --version 0.13.0
          cd crates/kalpixk-core
          wasm-pack build --target web --release
      
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalpixk-core-wasm
          path: crates/kalpixk-core/pkg/

  # ─── Lint y tests Python ──────────────────────────────────────────────────────
  python-check:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
      
      - name: Instalar dependencias
        run: |
          cd python
          uv sync --all-extras
      
      - name: Ruff lint
        run: |
          cd python
          uv run ruff check .
      
      - name: Tests (sin GPU)
        run: |
          cd python
          uv run pytest tests/ -v --tb=short
        env:
          KALPIXK_FORCE_CPU: "true"

  # ─── Build y deploy frontend ──────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: kalpixk-core-wasm
          path: web/src/wasm/pkg/
      
      - name: Instalar dependencias
        run: |
          cd web
          npm ci
      
      - name: Build
        run: |
          cd web
          npm run build
      
      - name: Deploy a Netlify (solo main)
        if: github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: web/dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ─── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cargo audit (Rust dependencies)
        run: |
          cargo install cargo-audit
          cargo audit
      
      - name: Trivy scan (Docker)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0  # No fallar el pipeline, solo reportar
