name: Kalpixk CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1
  RUST_LOG: debug

jobs:
  # Rust lint and test
  rust-check:
    name: Rust lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      
      - name: Format check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      
      - name: Tests unitarios
        run: cargo test --all

  # Job: Build WASM
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasmpack
        run: cargo install wasm-pack

      - name: Build WASM
        run: |
          cd crates/kalpixk-core
          wasm-pack build --target web --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalpixk-wasm
          path: crates/kalpixk-core/pkg/
          retention-days: 30

      - name: Show WASM size
        run: |
          ls -lh crates/kalpixk-core/pkg/
          echo "WASM size: $(du -sh crates/kalpixk-core/pkg/kalpixk_core_bg.wasm | cut -f1)"

  # Python lint and test
  python-check:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar uv
        uses: astral-sh/setup-uv@v3
      
      - name: Instalar dependencias
        run: |
          cd python
          uv sync --all-extras
      
      - name: Ruff lint
        run: |
          cd python
          uv run ruff check .
      
      - name: Tests (sin GPU)
        run: |
          cd python
          uv run pytest tests/ -v --tb=short
        env:
          KALPIXK_FORCE_CPU: "true"

  # Build and deploy frontend
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm
      
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: kalpixk-wasm
          path: crates/kalpixk-core/pkg/
      
      - name: Instalar dependencias
        run: |
          cd web
          pnpm install

      - name: Tests
        run: |
          cd web
          pnpm test
      
      - name: Build
        run: |
          cd web
          pnpm build
      
      - name: Deploy a Netlify (solo main)
        if: github.ref == 'refs/heads/main'
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: web/dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # Security scan
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cargo audit (Rust dependencies)
        run: |
          cargo install cargo-audit
          cargo audit
      
      - name: Trivy scan (Docker)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0
