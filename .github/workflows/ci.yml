name: Kalpixk CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # ── 1. Rust: lint + test + build WASM ──────────────────────────────────────
  rust-check:
    name: Rust lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
      - name: Build WASM
        run: |
          cargo install wasm-pack --version 0.13.0 --locked
          cd crates/kalpixk-core
          BUILD_HASH=$(git rev-parse --short HEAD) \
            wasm-pack build --target web --release
      - name: Check WASM size < 1MB
        run: |
          SIZE=$(wc -c < $(find crates/kalpixk-core/pkg -name "*.wasm" | head -1))
          echo "WASM size: ${SIZE} bytes"
          [ "$SIZE" -lt 1048576 ] && echo "✅ OK" || (echo "❌ Over 1MB" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: kalpixk-core-wasm
          path: crates/kalpixk-core/pkg/
          retention-days: 1

  # ── 2. Python: lint + test ──────────────────────────────────────────────────
  python-check:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: cd python && uv sync --all-extras
      - run: cd python && uv run ruff check .
      - run: cd python && uv run pytest tests/ -v --tb=short
        env:
          KALPIXK_FORCE_CPU: "true"

  # ── 3. Frontend: build ──────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: [rust-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: actions/download-artifact@v4
        with:
          name: kalpixk-core-wasm
          path: web/src/wasm/pkg/
      - run: cd web && npm ci
      - run: cd web && npx tsc --noEmit
      - name: Build for GitHub Pages
        run: cd web && npm run build
        env:
          VITE_BASE_URL: "/Wasm-Kalpixk_IA_DevOps/"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  # ── 4. Deploy → GitHub Pages ────────────────────────────────────────────────
  deploy-pages:
    name: Deploy → GitHub Pages
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "deploy: ${{ github.sha }}"

  # ── 5. Deploy → Netlify (optional, needs secrets) ──────────────────────────
  deploy-netlify:
    name: Deploy → Netlify
    runs-on: ubuntu-latest
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist
      - uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        continue-on-error: true   # Don't fail if secrets not configured

  # ── 6. Security scan ────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [rust-check, python-check]
    steps:
      - uses: actions/checkout@v4
      - run: cargo install cargo-audit --locked && cargo audit || true
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "0"
