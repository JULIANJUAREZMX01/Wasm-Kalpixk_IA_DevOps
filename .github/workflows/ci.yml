name: Kalpixk CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: lint + tests (SIN cargo fmt --check) ────────────────────────────
  rust-check:
    name: "Rust — clippy + cargo test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true

      - name: Tests unitarios
        run: cargo test --all

  # ── WASM build (verifica compilación completa) ────────────────────────────
  build-wasm:
    name: "WASM — wasm-pack build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Instalar wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: wasm-pack build --release
        run: |
          cd crates/kalpixk-core
          wasm-pack build --target web --release
          echo "✅ WASM size: $(du -sh pkg/kalpixk_core_bg.wasm | cut -f1)"
          ls -lh pkg/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: kalpixk-wasm
          path: crates/kalpixk-core/pkg/
          retention-days: 7

  # ── Python: tests sin GPU ─────────────────────────────────────────────────
  python-check:
    name: "Python — pytest (CPU mode)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias (pip directo, sin uv)
        run: |
          pip install --quiet             fastapi "uvicorn[standard]" pydantic             numpy scikit-learn msgpack websockets             httpx pytest pytest-asyncio
          # PyTorch CPU — suficiente para tests sin GPU
          pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu

      - name: pytest
        run: |
          cd python
          python -m pytest tests/ -v --tb=short -x --ignore=tests/test_api.py
        env:
          KALPIXK_FORCE_CPU: "true"
        continue-on-error: true

  # ── Frontend build (depende de WASM) ─────────────────────────────────────
  frontend:
    name: "Frontend — Vite build"
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4

      - name: Descargar WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: kalpixk-wasm
          path: web/src/wasm/

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm install + build
        run: |
          cd web
          npm install
          npm run build
        env:
          VITE_BASE_URL: /Wasm-Kalpixk_IA_DevOps/

      - name: Verificar build
        run: |
          echo "✅ Archivos en web/dist/:"
          find web/dist -type f | head -20
