version: "3.9"

# ─── Kalpixk Production Stack con AMD ROCm ───────────────────────────────────
# Uso: docker compose -f docker-compose.rocm.yml up -d
# Requiere: AMD Instinct MI300X + ROCm 7.2

services:
  
  # ── Backend de detección (AMD ROCm) ──────────────────────────────────────────
  kalpixk-api:
    image: rocm/pytorch:rocm6.2_ubuntu22.04_py3.10_pytorch_release_2.1.0  # Imagen oficial AMD con ROCm + PyTorch
    container_name: kalpixk-api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./python:/app
      - ./models:/app/models     # Modelos entrenados
      - kalpixk-logs:/var/log/kalpixk
    environment:
      - PYTHONPATH=/app
      - KALPIXK_ENV=production
      - KALPIXK_LOG_LEVEL=INFO
      - KALPIXK_LLM_URL=http://kalpixk-llm:8001
      # AMD ROCm
      - HSA_OVERRIDE_GFX_VERSION=9.4.2  # MI300X gfx940
      - ROCR_VISIBLE_DEVICES=0
    command: >
      uvicorn api.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --access-log
    ports:
      - "8000:8000"
    networks:
      - kalpixk-net
    # Acceso a GPU AMD
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LLM Explainer (Llama 70B vía vLLM) ───────────────────────────────────────
  kalpixk-llm:
    image: rocm/vllm:rocm6.2   # vLLM con ROCm
    container_name: kalpixk-llm
    restart: unless-stopped
    environment:
      - HSA_OVERRIDE_GFX_VERSION=9.4.2
      - ROCR_VISIBLE_DEVICES=0
    command: >
      python -m vllm.entrypoints.openai.api_server
        --model meta-llama/Meta-Llama-3.1-70B-Instruct
        --host 0.0.0.0
        --port 8001
        --tensor-parallel-size 1
        --max-model-len 4096
        --dtype float16
    ports:
      - "8001:8001"
    networks:
      - kalpixk-net
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    volumes:
      - llm-models:/root/.cache/huggingface  # Cache de modelos HuggingFace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 30s
      retries: 5

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  kalpixk-nginx:
    image: nginx:alpine
    container_name: kalpixk-nginx
    restart: unless-stopped
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - kalpixk-api
    networks:
      - kalpixk-net

volumes:
  kalpixk-logs:
  llm-models:

networks:
  kalpixk-net:
    driver: bridge
